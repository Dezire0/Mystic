name = "mystic-console"
main = "worker/index.ts"
compatibility_date = "2026-07-13"
workers_dev = true

[assets]
directory = "./dist"
binding = "ASSETS"
not_found_handling = "single-page-application"
run_worker_first = ["/api/*"]

[[services]]
binding = "MYSTIC"
service = "mystic"

[[kv_namespaces]]
binding = "MYSTIC_CONSOLE_RATE_LIMITS"
id = "79bd1e2a6693409881514bc6faefeadf"

[vars]
MYSTIC_API_ORIGIN = "https://mystic.dexproject.workers.dev"
MYSTIC_CONSOLE_SESSION_TTL_SECONDS = "28800"

# Configure MYSTIC_CONSOLE_SESSION_SECRET, MYSTIC_CONSOLE_ADMIN_TOKEN, and
# MYSTIC_SERVICE_TOKEN as Cloudflare secrets. The existing Mystic Worker still
# enforces MCP OAuth for service-bound requests; do not place credentials here
# or in VITE_* variables.
