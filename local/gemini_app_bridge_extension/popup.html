<!doctype html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><link rel="stylesheet" href="styles.css"><title>Mystic Relay</title></head>
<body><main><h1>Gemini App Manual Relay</h1><p class="notice">Mystic cannot access Gemini. Copy, send, and import only text you can see.</p>
<div class="controls"><button id="start">Start Mystic Relay</button><button id="pause">Pause</button><button id="resume">Resume</button><button id="stop">Stop</button><button id="refresh">Refresh queue</button></div>
<dl><dt>Session</dt><dd id="session-id">-</dd><dt>Run</dt><dd id="run-id">-</dd><dt>Provider</dt><dd id="provider">Gemini App Manual Relay</dd><dt>Round / role</dt><dd id="round-role">-</dd><dt>Queue</dt><dd id="queue-count">0</dd></dl>
<label for="prompt">Approved prompt</label><textarea id="prompt" readonly></textarea><div class="controls"><button id="copy">Copy Prompt</button><button id="open-gemini">Open Gemini</button><button id="cancel">Cancel Job</button></div>
<label for="output">Paste visible Gemini response</label><textarea id="output" placeholder="Paste the complete visible response here"></textarea><label for="model">Visible model label (optional)</label><input id="model" maxlength="120" placeholder="Only enter a label you can see in Gemini"><div class="controls"><button id="preview">Preview Response</button><button id="import">Submit Response</button></div><pre id="preview-output" hidden></pre><pre id="status"></pre></main><script src="popup.js"></script></body></html>
